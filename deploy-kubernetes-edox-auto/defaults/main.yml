  signer-one:
    special_image: edoxauto-docker-local.artifact.firm.ru/signer:{{ service_version }}
    count_replicas: 1
    k8s_service_name: signer
    k8s_selector_label: signer
    consul_template: signer
    consul_service_name: signer
    consul_service_id_suffix: one
    ports:
      grpc: { internal: 8082, external: 2330 }
      http:  { internal: 8081, external: 2329 }
    cpu: '1000m'
    memory: '800Mi'
    ingress_hostname: "{{ balancer_url_k8s }}"
    ingress_paths:
      - path: /api/v1/Signer/
        pathtype: ImplementationSpecific
        type: http
        backend_port: 2329
      - path: /api/v1/SignatureVerifier/
        pathtype: ImplementationSpecific
        type: http
        backend_port: 2329
      - path: /api/v1/CertificatesConverter/
        pathtype: ImplementationSpecific
        type: http
        backend_port: 2329
      - path: /api/v1/SignerProxy/
        pathtype: ImplementationSpecific
        type: http
        backend_port: 2329
      - path: /grpc.edoxauto.signer.Signer/
        pathtype: ImplementationSpecific
        type: grpc
        backend_port: 2330
      - path: /grpc.edoxauto.signatureVerifier.SignatureVerifier/
        pathtype: ImplementationSpecific
        type: grpc
        backend_port: 2330
      - path: /grpc.edoxauto.certificatesConverter.CertificatesConverter/
        pathtype: ImplementationSpecific
        type: grpc
        backend_port: 2330
      - path: /grpc.edoxauto.SignerProxy.SignerProxy/
        pathtype: ImplementationSpecific
        type: grpc
        backend_port: 2330
    env:
      SignerSettings__RootCertificatesPath: /app/custom-root-certificates/Root/
      SignerSettings__CACertificatesPath: /app/custom-root-certificates/CA/
      CRYPTO_PRO_KEY: "{{ vault_secrets.crypto_pro_key_one }}"
    certificates:
      secret_name: signer-certificates
      mount_path: /app/custom-root-certificates
      files:
        signer_root_crypto_pro:
          path: Root/crypto_pro_gost_2012.cer
          src: signer/Root/crypto_pro_gost_2012.cer
        signer_root_mindigital:
          path: Root/mindigital_root.cer
          src: signer/Root/mindigital_root.cer
        signer_root_phoenix:
          path: Root/phoenix_root.cer
          src: signer/Root/phoenix_root.cer
        signer_root_cert_1:
          path: Root/root_cert_1.cer
          src: signer/Root/root_cert_1.cer
        signer_root_cert_2:
          path: Root/root_cert_2.cer
          src: signer/Root/root_cert_2.cer
        signer_root_cert_3:
          path: Root/root_cert_3.cer
          src: signer/Root/root_cert_3.cer
        signer_root_treasury:
          path: Root/treasury_russia_root.crt
          src: signer/Root/treasury_russia_root.crt
        signer_ca_icrs_nbki:
          path: CA/icrs_nbki_ru2023.cer
          src: signer/CA/icrs_nbki_ru2023.cer
        signer_ca_kontur:
          path: CA/kontur_intermediate.cer
          src: signer/CA/kontur_intermediate.cer
        signer_ca_treasury:
          path: CA/treasury_russia_ca.crt
          src: signer/CA/treasury_russia_ca.crt
        signer_ca_u30_prod:
          path: CA/u30_prod.cer
          src: signer/CA/u30_prod.cer
        signer_ca_u30_test:
          path: CA/u30_test.cer
