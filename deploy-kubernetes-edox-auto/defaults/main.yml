  raif-connector-one:
    special_image: edoxauto-docker-local.artifact.firm.ru/raif-connector:{{ service_version }}
    count_replicas: 1
    k8s_service_name: raif-connector
    k8s_selector_label: raif-connector
    consul_template: raif-connector
    consul_service_name: raif-connector
    consul_service_id_suffix: one
    ports:
      grpc: { internal: 8082, external: 26901 }
      http: { internal: 8081, external: 26900 }
    cpu: '600m'
    auth_login: "{{ raif_connector_auth_login_one }}"
    auth_password: "{{ vault_secrets.raif_connector_password_one }}"
    ingress_hostname: "{{ balancer_url_k8s }}"
    ingress_paths:
      - path: /api/v1/RaifConnector/
        pathtype: ImplementationSpecific
        type: http
        backend_port: 26900
      - path: /raif.BankService/
        pathtype: ImplementationSpecific
        type: grpc
        backend_port: 26901
    volume:
      pvc_name: raif-connector-one-data
      mount_path: /app/cache-files
      storage_class: longhorn
      size: 100Mi
      access_modes:
        - ReadWriteMany # Том можно одновременно монтировать на нескольких узлах и читать/писать из разных pod’ов. Если выставить другой mod, то при пересоздании POD со стратегией RollingUpdate, когда поднимается второй POD мы получим ошибку - Multi-Attach error for volume. Volume is already used by pod(s)

  raif-connector-two:
