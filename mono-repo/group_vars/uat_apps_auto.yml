deploy_user: edox-cicd-s
deploy_group: root
devops_compose_files_dir: /opt/docker
env_code: uat
consul_env_path: pp/edou01
consul_env_code: pp-edou01
consul_datacenter: dc-pp
default_image: "edoxauto-docker-local.artifact.firm.ru/{{ service_name }}:{{ service_version }}"
vault_agent_api_url: "http://127.0.0.1:8100"
vault_agent_name_directory: "vault_proxy_uat_edox_auto"
vault_ansible_secret_path: "project/data/edox_auto/{{ env_code }}/ansible_secrets"
vault_project_path: "project"
vault_proxy_url: "http://vault-agent:8100/"
vault_services_secret_path: "edox_auto/{{ env_code }}/{{ service_name }}/settings"
vault_services_secret_path_cb: "edox_auto/{{ env_code }}/certs/{{ env_code }}_certs"
vault_services_settings_secret_path: "{{ service_name }}/settings"

otel_env:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_HEALTHCHECK_ENDPOINT: "http://otel-collector:13133"
  OTEL_SDK_DISABLED: "false"

services:
  certificates-manager:
    enable_otel: true
    tcp_port: 6940:8081
    grpc_port: 6941:8082
    environment:
      GRPC_DNS_RESOLVER: native
      ConsulSettings__ConsulEndpoint: http://consul-agent:8500
      ConsulSettings__ServiceHost: "{{ target_server_name }}"
      ConsulSettings__ConfigPrefix: "{{ consul_env_path }}/{{ data_center }}"
      ConsulSettings__ServiceName: "{{ service_name }}"
      ConsulSettings__SettingsName: "{{ service_version }}/settings.{{ service_config_version }}"
      ConsulSettings__ServicePrefix: "{{ consul_env_code }}"
      ConsulSettings__ServiceIdSuffix: "{{ target_server_name }}"
      ConsulSettings__HealthCheckServiceHost: "{{ service_name }}"
      ConsulSettings__HttpPort: "6940"
      ConsulSettings__GrpcPort: "6941"
      ConsulSettings__HealthCheckHttpPort: "8081"
      ConsulSettings__HealthCheckGrpcPort: "8082"    
